<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | r3dkoiarts</title>
    <link rel="stylesheet" href="style.css">
    <script src="gallery-data.js" defer></script> <!-- must load before script.js so galleryData is available -->
    <script src="script.js" defer></script>
    <!-- Tells search engines what this page is about — shows under the link in Google results -->
    <meta name="description" content="Digital artwork by me.">
    <!-- Open Graph: controls how this page looks when shared on Discord, Twitter, etc. -->
    <meta property="og:title" content="Gallery | r3dkoiarts">
    <meta property="og:description" content="Digital artwork by r3dkoi.">
    <meta property="og:url" content="https://r3dkoi.github.io/gallery.html">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://r3dkoi.github.io/images/logo.png"> 
<!-- Workpieces Showcase -->
</head>
<body>
    <!-- Navigation — fixed to top right, shared across all pages -->
    <nav>
        <div class="logo"><img src="images/logo.png" alt="r3dkoiarts watermark logo"></div>
        <div class="nav-right">
            <button class="dark-mode-toggle">☽</button> <!-- dark/light mode toggle, preference saved to localStorage -->
            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/gallery.html">Gallery</a></li>
                <li><a href="/about.html">About</a></li>
                <li><a href="/contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Gallery intro  -->
    <section class="gallery-information">
        <h2>DIGITAL ARTWORK</h2>
        <p class="subtitle">Hover or Tap on each piece to read more about them!</p>
        <p>All art have been drawn by me using Clip Studio Paint. A variety of them are fanart or from my own personal passion projects.</p>
    </section>

    <!-- Gallery grid  -->
    <section class="gallery">
        <div class="gallery-track"></div>
    </section>

    <!-- Footer — copyright, social links, and brand name -->
    <footer>
        <div class="footer-top">
            <p>© 2026 Kyla Sofocado</p>
        </div>
        <div class="social-links">
            <a href="#">
                <img class="twitter-icon" src="images/logo-white.png" alt="X, also known as, Twitter, link to r3dkoiarts">
            </a>
            <a href="#">
                <img class="github-icon" src="images/GitHub Logos/SVG/GitHub_Invertocat_White_Clearspace.svg" alt="Github repository link page">
            </a>
        </div>
        <div class="footer-brand">
            <span>R3DKOI</span>
            <span>ARTS</span>
        </div>
    </footer>

    <!-- Lightbox commented out until I decide if I want the feature of popping out the artwork into its own little screen
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">✕</button>
        <img src="" alt="" id="lightbox-img">
    </div>
    -->

</body>
</html>
