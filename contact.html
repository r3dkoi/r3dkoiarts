<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Contact | r3dkoiarts</title>
    <!-- Tells search engines what this page is about — shows under the link in Google results -->
    <meta name="description" content="Get in touch with me for work.">
    <!-- Open Graph: controls how this page looks when shared on Discord, Twitter, etc. -->
    <meta property="og:title" content="Contact | r3dkoiarts">
    <meta property="og:description" content="Get in touch.">
    <meta property="og:url" content="https://r3dkoi.github.io/contact.html">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://r3dkoi.github.io/images/logo.png"> 
    <!--Contact Page-->
</head>
<body>
    <!-- Navigation — fixed to top right, shared across all pages -->
    <nav>
        <div class="logo"><img src="images/logo.png" alt="r3dkoiarts watermark logo"></div>
        <div class="nav-right">
            <button class="dark-mode-toggle">☽</button> <!-- dark/light mode toggle, preference saved to localStorage -->
            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/gallery.html">Gallery</a></li>
                <li><a href="/about.html">About</a></li>
                <li><a href="/contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contact section -->
    <section class="contact">
        <h2>Want to work together?</h2>
        <p>I'm open to commissions, though I am still setting it up. Having a chat is fun too!</p>

        <form>
            <div class="form-row">
                <div class="form-field">
                    <label for="fullname">Name</label>
                    <input 
                    type="text" 
                    id="fullname" 
                    name="fullname" 
                    placeholder="Name" 
                    required>
                </div>
                <div class="form-field">
                    <label for="email_contact">Email</label>
                    <input type="email" 
                    id="email_contact" 
                    name="email_contact" 
                    placeholder="Email" 
                    required>
                </div>
            </div>
            <div class="form-field">
                <label for="subject">Subject</label>
                <input 
                type="text" 
                id="subject" 
                name="subject" 
                placeholder="Subject" 
                required>
            </div>
            <div class="form-field">
                <label for="message">Message</label>
                <textarea 
                id="message" 
                name="message" 
                placeholder="What's on your mind?" 
                required></textarea>
            </div>
            <button type="submit">Send it off</button>
        </form>
    </section>

    <!-- Footer — copyright, social links, and brand name -->
    <footer>
        <div class="footer-top">
            <p>© 2026 Kyla Sofocado</p>
        </div>
        <div class="social-links">
            <a href="#">
                <img class="twitter-icon" src="images/logo-white.png" alt="X, also known as, Twitter, link to r3dkoiarts">
            </a>
            <a href="#">
                <img class="github-icon" src="images/GitHub Logos/SVG/GitHub_Invertocat_White_Clearspace.svg" alt="Github repository link page">
            </a>
        </div>
        <div class="footer-brand">
            <span>R3DKOI</span>
            <span>ARTS</span>
        </div>
    </footer>
</body>
</html>
